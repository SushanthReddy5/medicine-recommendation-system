
<!DOCTYPE html>
<html>
<head>
<title>Medicine Recommendation System</title>
</head>

<body>

<h2>Online Medicine Recommendation System</h2>

<form method="POST">
    <label>Enter your symptom:</label><br><br>
    <input type="text" name="symptom" required>
    <br><br>
    <button type="submit">Get Recommendation</button>
</form>

{% if medicine %}
<h3>Recommended Medicine: {{ medicine }}</h3>
{% endif %}

</body>
</html>
